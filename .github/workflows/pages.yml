# Publishes static site to GitHub Pages (Actions source).
# Settings → Pages → Build and deployment → Source: GitHub Actions (not “Deploy from branch” unless you use /docs or root index).
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Assemble site
        run: |
          mkdir -p _site
          # Prefer docs/; fall back to repo root (covers both layouts)
          if [ -f docs/index.html ]; then cp docs/index.html _site/index.html; elif [ -f index.html ]; then cp index.html _site/index.html; else echo 'No index.html'; exit 1; fi
          touch _site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
